<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infoblack TV — Para Hombres</title>
  <style>
    :root {
      --bg:        #0d0d12;
      --panel:     #14141c;
      --card:      #1a1a25;
      --border:    #252535;
      --hover:     #22223a;
      --accent:    #e63946;
      --accent2:   #f4a261;
      --text:      #f0f0f0;
      --muted:     #777;
      --radius:    10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 54px; background: var(--panel);
      border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 20;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.15rem; color: var(--accent); text-decoration: none; }
    .logo span { color: var(--text); }
    .live-pill { background: var(--accent); color: #fff; font-size: .6rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: 1px; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

    .search-box { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; gap: 8px; width: 240px; }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: .875rem; padding: 8px 0; width: 100%; }
    .search-box input::placeholder { color: var(--muted); }

    /* ── MAIN TABS ── */
    .main-tabs {
      display: flex; align-items: center; gap: 4px;
      padding: 0 16px; background: var(--panel);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .mtab {
      padding: 12px 18px; border: none; background: none;
      color: var(--muted); font-size: .875rem; font-weight: 600;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: all .15s; white-space: nowrap;
    }
    .mtab:hover { color: var(--text); }
    .mtab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    aside {
      width: 220px; background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0;
    }
    .cat-list { padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
    .cat-btn {
      display: flex; align-items: center; gap: 9px; padding: 9px 11px;
      border-radius: 8px; border: none; background: none; color: var(--muted);
      font-size: .83rem; cursor: pointer; text-align: left; transition: all .15s;
    }
    .cat-btn:hover { background: var(--hover); color: var(--text); }
    .cat-btn.active { background: var(--accent); color: #fff; }
    .cat-btn .ico { font-size: 1rem; width: 18px; text-align: center; }
    .cat-btn .cnt { margin-left: auto; background: rgba(255,255,255,.1); border-radius: 10px; padding: 1px 7px; font-size: .7rem; }
    .cat-btn.active .cnt { background: rgba(255,255,255,.25); }

    /* ── MAIN CONTENT ── */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── PLAYER ── */
    .player-wrap {
      background: #000; position: relative; flex-shrink: 0;
      transition: height .2s;
    }
    .player-wrap iframe, .player-wrap video {
      width: 100%; height: 100%; border: none; display: block;
    }
    .placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px; color: var(--muted);
    }
    .placeholder .ph-icon { font-size: 3.5rem; opacity: .3; }
    .placeholder p { font-size: .95rem; }
    .placeholder small { font-size: .75rem; }

    .resize-bar { height: 5px; background: var(--border); cursor: ns-resize; flex-shrink: 0; transition: background .15s; }
    .resize-bar:hover { background: var(--accent); }

    /* ── PLAYER INFO BAR ── */
    .player-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; background: var(--panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0; min-height: 42px;
    }
    .now-playing { display: flex; align-items: center; gap: 8px; font-size: .875rem; font-weight: 600; }
    .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: blink 2s infinite; display: none; }
    .controls { display: flex; gap: 6px; }
    .cbtn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: .78rem; transition: background .15s;
    }
    .cbtn:hover { background: var(--hover); }
    .cbtn.red { background: var(--accent); border-color: var(--accent); }
    .cbtn.red:hover { background: #c0303b; }

    /* ── CONTENT AREA ── */
    .content-area { flex: 1; overflow-y: auto; padding: 16px; }

    .section-head {
      font-size: .7rem; font-weight: 700; letter-spacing: 1px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-head::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── CHANNEL GRID ── */
    .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 9px; margin-bottom: 22px; }
    .ch-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 13px 9px; cursor: pointer; transition: all .15s;
      display: flex; flex-direction: column; align-items: center; gap: 7px; text-align: center;
      position: relative; overflow: hidden;
    }
    .ch-card:hover { border-color: var(--accent); background: var(--hover); transform: translateY(-2px); }
    .ch-card.active { border-color: var(--accent); background: rgba(230,57,70,.1); }
    .ch-card.active::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:var(--accent); }
    .ch-card .em { font-size: 1.7rem; line-height: 1; }
    .ch-card .nm { font-size: .75rem; font-weight: 600; color: var(--text); line-height: 1.2; }
    .ch-badge { font-size: .58rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
    .b-sport  { background: rgba(230,57,70,.18);  color: #e63946; }
    .b-action { background: rgba(255,152,0,.18);  color: #ffb74d; }
    .b-know   { background: rgba(76,175,80,.18);  color: #81c784; }
    .b-news   { background: rgba(33,150,243,.18); color: #64b5f6; }
    .b-battle { background: rgba(156,39,176,.18); color: #ce93d8; }
    .b-learn  { background: rgba(0,188,212,.18);  color: #4dd0e1; }
    .b-car    { background: rgba(244,162,97,.18); color: #f4a261; }

    /* ── CONTENT CARDS (YouTube / Aprende / Autos / Batallas) ── */
    .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; margin-bottom: 24px; }
    .content-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; overflow: hidden; transition: all .15s;
    }
    .content-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .content-card.active { border-color: var(--accent); }
    .thumb {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      background: #111; display: flex; align-items: center; justify-content: center;
      font-size: 3rem; position: relative; overflow: hidden;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .play-over {
      position: absolute; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center; opacity: 0; transition: .15s;
    }
    .thumb .play-over svg { fill: white; width: 40px; }
    .content-card:hover .play-over { opacity: 1; }
    .card-info { padding: 10px; }
    .card-info .ct { font-size: .8rem; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .card-info .cs { font-size: .7rem; color: var(--muted); }

    /* ── TABS INSIDE SECTION ── */
    .section-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .stab {
      padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .stab:hover { color: var(--text); border-color: var(--muted); }
    .stab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── EMPTY ── */
    .empty { display: flex; flex-direction: column; align-items: center; padding: 50px; color: var(--muted); gap: 10px; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── TABS VISIBILITY ── */
    .tab-section { display: none; height: 100%; flex-direction: column; overflow: hidden; }
    .tab-section.visible { display: flex; }

    @media (max-width: 600px) {
      aside { display: none; }
      .search-box { width: 160px; }
      .mtab { padding: 10px 12px; font-size: .8rem; }
    }
  </style>
</head>

/* ═══════════════════════════════════════════
   ESTADO
═══════════════════════════════════════════ */
let currentTab    = 'tv';
let tvCat         = 'all';
let battleFilter  = 'all';
let learnFilter   = 'all';
let searchTerm    = '';
let currentTvIdx  = -1;
let currentYT     = null; // { list, idx }

/* ═══════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════ */
function playIframe(url, name) {
  document.getElementById('placeholder').style.display = 'none';
  const f = document.getElementById('playerFrame');
  f.style.display = 'block';
  f.src = url;
  document.getElementById('dot').style.display = 'inline-block';
  document.getElementById('nowName').textContent = name;
}

function playYT(videoId, title) {
  const url = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  playIframe(url, title);
}

/* ═══════════════════════════════════════════
   TV EN VIVO
═══════════════════════════════════════════ */
function tvFiltered() {
  return tvChannels.filter(c => {
    const matchCat  = tvCat === 'all' || c.cat === tvCat;
    const matchSrch = c.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat && matchSrch;
  });
}

function renderTV() {
  const area  = document.getElementById('tvArea');
  const empty = document.getElementById('tvEmpty');
  area.querySelectorAll('.section-head,.ch-grid').forEach(e => e.remove());

  const list = tvFiltered();
  if (!list.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  if (tvCat === 'all' && !searchTerm) {
    const groups = {
      sport:  { label:'⚽ Deportes', items:[] },
      action: { label:'🔥 Acción / Cine', items:[] },
      know:   { label:'🧠 Historia & Ciencia', items:[] },
      news:   { label:'📰 Noticias', items:[] },
    };
    list.forEach(c => groups[c.cat].items.push(c));
    Object.values(groups).forEach(g => {
      if (!g.items.length) return;
      const h = document.createElement('div'); h.className = 'section-head'; h.textContent = g.label; area.appendChild(h);
      area.appendChild(buildTvGrid(g.items));
    });
  } else {
    area.appendChild(buildTvGrid(list));
  }
}

function buildTvGrid(list) {
  const g = document.createElement('div'); g.className = 'ch-grid';
  list.forEach(ch => {
    const idx = tvChannels.indexOf(ch);
    const card = document.createElement('div');
    card.className = 'ch-card' + (idx === currentTvIdx ? ' active' : '');
    card.dataset.idx = idx;
    card.innerHTML = `<span class="em">${ch.emoji}</span><span class="nm">${ch.name}</span><span class="ch-badge ${catBadge[ch.cat]}">${catLabel[ch.cat]}</span>`;
    card.onclick = () => selectTV(idx);
    g.appendChild(card);
  });
  return g;
}

function selectTV(idx) {
  currentTvIdx = idx;
  currentYT = null;
  const ch = tvChannels[idx];
  playIframe(ch.url, ch.name);
  document.querySelectorAll('.ch-card').forEach(c => c.classList.toggle('active', +c.dataset.idx === idx));
  document.querySelector('.ch-card.active')?.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function updateCounts() {
  document.getElementById('cnt-all').textContent    = tvChannels.length;
  document.getElementById('cnt-sport').textContent  = tvChannels.filter(c=>c.cat==='sport').length;
  document.getElementById('cnt-action').textContent = tvChannels.filter(c=>c.cat==='action').length;
  document.getElementById('cnt-know').textContent   = tvChannels.filter(c=>c.cat==='know').length;
  document.getElementById('cnt-news').textContent   = tvChannels.filter(c=>c.cat==='news').length;
}

/* ═══════════════════════════════════════════
   CONTENT GRIDS (Batallas / Aprende / Autos)
═══════════════════════════════════════════ */
function buildContentGrid(items, gridId, activeKey, filterKey) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'content-card' + (currentYT && currentYT.gridId===gridId && currentYT.idx===i ? ' active' : '');
    card.innerHTML = `
      <div class="thumb">
        <img src="${item.thumb}" loading="lazy" alt="${item.title}" onerror="this.style.display='none'">
        <div class="play-over"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="card-info">
        <div class="ct">${item.title}</div>
        <div class="cs">${item.sub}</div>
      </div>`;
    card.onclick = () => {
      currentYT = { gridId, idx: i, list: items };
      currentTvIdx = -1;
      playYT(item.vid, item.title);
      document.querySelectorAll(`#${gridId} .content-card`).forEach((c,j) => c.classList.toggle('active', j===i));
    };
    grid.appendChild(card);
  });
}

function renderBattles() {
  const f = battleFilter;
  const list = f === 'all' ? battles : battles.filter(b => b.bt === f);
  buildContentGrid(list, 'battleGrid', 'bt', battleFilter);
}

function renderLearn() {
  const f = learnFilter;
  const list = f === 'all' ? learning : learning.filter(l => l.lt === f);
  buildContentGrid(list, 'learnGrid', 'lt', learnFilter);
}

function renderCars() {
  buildContentGrid(cars, 'carsGrid');
}

/* ═══════════════════════════════════════════
   PREV / NEXT
═══════════════════════════════════════════ */
function prevItem() {
  if (currentTab === 'tv') {
    const list = tvFiltered();
    if (!list.length) return;
    const cur = list.findIndex(c => tvChannels.indexOf(c) === currentTvIdx);
    const p = cur <= 0 ? list.length-1 : cur-1;
    selectTV(tvChannels.indexOf(list[p]));
  } else if (currentYT) {
    const { list, gridId } = currentYT;
    const ni = currentYT.idx <= 0 ? list.length-1 : currentYT.idx-1;
    currentYT.idx = ni;
    playYT(list[ni].vid, list[ni].title);
    document.querySelectorAll(`#${gridId} .content-card`).forEach((c,j) => c.classList.toggle('active', j===ni));
  }
}

function nextItem() {
  if (currentTab === 'tv') {
    const list = tvFiltered();
    if (!list.length) return;
    const cur = list.findIndex(c => tvChannels.indexOf(c) === currentTvIdx);
    const n = cur >= list.length-1 ? 0 : cur+1;
    selectTV(tvChannels.indexOf(list[n]));
  } else if (currentYT) {
    const { list, gridId } = currentYT;
    const ni = currentYT.idx >= list.length-1 ? 0 : currentYT.idx+1;
    currentYT.idx = ni;
    playYT(list[ni].vid, list[ni].title);
    document.querySelectorAll(`#${gridId} .content-card`).forEach((c,j) => c.classList.toggle('active', j===ni));
  }
}

function goFull() {
  const el = document.getElementById('playerWrap');
  if (!document.fullscreenElement) el.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

/* ═══════════════════════════════════════════
   MAIN TAB SWITCHING
═══════════════════════════════════════════ */
document.querySelectorAll('.mtab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.mtab').forEach(b => b.classList.toggle('active', b===btn));
    document.querySelectorAll('.tab-section').forEach(s => s.classList.toggle('visible', s.id===`tab-${currentTab}`));
    document.getElementById('sidebar').style.display = currentTab === 'tv' ? '' : 'none';
    // reset search
    document.getElementById('searchInput').value = '';
    searchTerm = '';
  });
});

/* ═══════════════════════════════════════════
   CAT BUTTONS
═══════════════════════════════════════════ */
document.getElementById('catList').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn'); if (!btn) return;
  tvCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b===btn));
  renderTV();
});

/* ═══════════════════════════════════════════
   SUB-TABS Batallas
═══════════════════════════════════════════ */
document.getElementById('battleTabs').addEventListener('click', e => {
  const btn = e.target.closest('.stab'); if (!btn) return;
  battleFilter = btn.dataset.bt;
  document.querySelectorAll('#battleTabs .stab').forEach(b => b.classList.toggle('active', b===btn));
  renderBattles();
});

document.getElementById('learnTabs').addEventListener('click', e => {
  const btn = e.target.closest('.stab'); if (!btn) return;
  learnFilter = btn.dataset.lt;
  document.querySelectorAll('#learnTabs .stab').forEach(b => b.classList.toggle('active', b===btn));
  renderLearn();
});

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  if (currentTab === 'tv') renderTV();
});

/* ═══════════════════════════════════════════
   RESIZE PLAYER
═══════════════════════════════════════════ */
let resizing=false, rStartY=0, rStartH=0;
document.getElementById('resizeBar').addEventListener('mousedown', e => {
  resizing=true; rStartY=e.clientY; rStartH=document.getElementById('playerWrap').offsetHeight;
  document.body.style.userSelect='none';
});
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const h = Math.max(160, Math.min(rStartH+(e.clientY-rStartY), window.innerHeight-250));
  document.getElementById('playerWrap').style.height = h+'px';
});
document.addEventListener('mouseup', () => { resizing=false; document.body.style.userSelect=''; });

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
updateCounts();
renderTV();
renderBattles();
renderLearn();
renderCars();
</script>
