<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="InfoblackTV"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="logo.png"/>
<title>Infoblack TV</title>
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--card:#161616;
  --border:#252525;--gold:#f5a623;--red:#e50914;
  --text:#fff;--muted:#777;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:rgba(10,10,10,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo img{height:32px;width:32px;border-radius:50%;object-fit:cover;}
.logo-text{font-weight:900;font-size:1rem;color:var(--gold);letter-spacing:.5px;}
.search-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:0 13px;max-width:340px;
}
.search-wrap input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:.85rem;padding:9px 0;
}
.search-wrap input::placeholder{color:var(--muted);}

/* CATS */
.cats{
  display:flex;gap:7px;overflow-x:auto;padding:10px 14px;
  border-bottom:1px solid var(--border);scrollbar-width:none;
}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{
  display:flex;align-items:center;gap:5px;white-space:nowrap;
  padding:6px 15px;border-radius:20px;border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.cat-btn:hover{color:var(--text);border-color:#444;}
.cat-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

/* PAGE */
.page{padding:14px;display:flex;flex-direction:column;gap:22px;}

.section-title{
  font-size:.72rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* GRID */
.ch-grid{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
}
.ch-card{
  position:relative;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;
}
.ch-card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.5);}
.ch-card.playing{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,166,35,.4);}
.ch-thumb{
  width:100%;aspect-ratio:16/9;background:#0d0d0d;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.ch-thumb img{width:100%;height:100%;object-fit:contain;padding:12px;}
.ch-thumb .ico{font-size:2.2rem;}
.live-dot{
  position:absolute;top:6px;left:7px;z-index:2;
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.75);border-radius:10px;padding:2px 7px 2px 5px;
}
.live-dot .dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-dot span{font-size:.55rem;font-weight:800;color:#fff;letter-spacing:.5px;}
.ch-del{
  position:absolute;top:5px;right:5px;z-index:3;
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,.65);border:1px solid #333;
  display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:.68rem;color:var(--muted);transition:all .15s;
}
.ch-del:hover{background:var(--red);color:#fff;border-color:var(--red);}
.ch-card:hover .ch-del{display:flex;}
.ch-info{padding:8px 9px 10px;}
.ch-name{font-size:.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-sub{font-size:.62rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* MODAL PLAYER */
.modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:#000;flex-direction:column;
}
.modal.open{display:flex;}
.modal-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 15px;background:rgba(0,0,0,.9);flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.modal-title{font-size:.92rem;font-weight:800;}
.modal-sub{font-size:.7rem;color:var(--muted);margin-top:2px;}
.modal-close{
  background:none;border:none;color:var(--text);cursor:pointer;
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border);font-size:1rem;
}
.modal-close:hover{background:var(--red);border-color:var(--red);}
.player-box{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.player-box iframe{width:100%;height:100%;border:none;}
.loading-overlay{
  position:absolute;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  color:var(--muted);font-size:.85rem;z-index:5;
}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-footer{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 14px;background:rgba(0,0,0,.9);flex-shrink:0;flex-wrap:wrap;
  border-top:1px solid var(--border);
}
.fbtn{
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:7px 16px;border-radius:20px;
  cursor:pointer;font-size:.76rem;font-weight:700;transition:background .15s;
}
.fbtn:hover{background:var(--border);}
.fbtn.gold{background:var(--gold);border-color:var(--gold);color:#000;}

/* INSTALL BANNER */
.inst{
  display:none;position:fixed;bottom:14px;left:12px;right:12px;z-index:60;
  background:#111;border:1px solid var(--gold);border-radius:12px;padding:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.8);
}
.inst.show{display:block;}
.inst-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.inst-title{font-size:.88rem;font-weight:800;color:var(--gold);}
.inst-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
.inst-sub{font-size:.72rem;color:var(--muted);margin-bottom:10px;}
.inst-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:10px;font-size:.85rem;font-weight:800;cursor:pointer;}

/* TOAST */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);
  z-index:200;background:rgba(20,20,20,.97);border:1px solid var(--border);
  color:var(--text);padding:8px 18px;border-radius:20px;font-size:.78rem;font-weight:700;
  opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:.85rem;}
</style>
</head>

/* ═══ ESTADO ═══ */
const HIDDEN_KEY = 'ib_hidden_v3';
let hidden   = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY)||'[]'));
let activeCat = 'todos';
let searchQ   = '';
let currentList = [];
let currentIdx  = -1;
let deferredPrompt = null;
let loadTimer = null;

/* ═══ FILTRO ═══ */
function filtered() {
  return CHANNELS.filter(c => {
    if (hidden.has(c.src)) return false;
    if (activeCat !== 'todos' && c.cat !== activeCat) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return c.name.toLowerCase().includes(q) || c.sub.toLowerCase().includes(q);
    }
    return true;
  });
}

/* ═══ RENDER ═══ */
function render() {
  const list = filtered();
  currentList = list;
  const page = document.getElementById('page');
  page.innerHTML = '';

  if (!list.length) {
    page.innerHTML = '<div class="empty">Sin canales para mostrar</div>';
    return;
  }

  // Agrupar por categoría
  const groups = {};
  for (const ch of list) {
    const label = catLabel(ch.cat);
    if (!groups[label]) groups[label] = [];
    groups[label].push(ch);
  }

  for (const [label, chs] of Object.entries(groups)) {
    const sec = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = label;
    sec.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'ch-grid';
    chs.forEach(ch => grid.appendChild(buildCard(ch, list)));
    sec.appendChild(grid);
    page.appendChild(sec);
  }
}

function catLabel(cat) {
  return {
    deportes:'⚽ Deportes', wwe:'🥊 WWE / Lucha', anime:'🎌 Anime',
    chile:'🇨🇱 Chile', noticias:'📰 Noticias',
    peliculas:'🎬 Películas', musica:'🎵 Música', infantil:'👶 Infantil',
  }[cat] || cat;
}

function buildCard(ch, list) {
  const card = document.createElement('div');
  card.className = 'ch-card';

  const thumb = document.createElement('div');
  thumb.className = 'ch-thumb';
  thumb.innerHTML = `
    <span class="ico">${ch.ico}</span>
    <div class="live-dot"><span class="dot"></span><span>EN VIVO</span></div>
  `;

  const del = document.createElement('button');
  del.className = 'ch-del';
  del.textContent = '✕';
  del.title = 'Ocultar';
  del.onclick = e => { e.stopPropagation(); hideChannel(ch, card); };
  thumb.appendChild(del);

  const info = document.createElement('div');
  info.className = 'ch-info';
  info.innerHTML = `<div class="ch-name">${ch.name}</div><div class="ch-sub">${ch.sub}</div>`;

  card.appendChild(thumb);
  card.appendChild(info);
  card.onclick = () => openPlayer(ch, list, list.indexOf(ch));
  return card;
}

/* ═══ PLAYER ═══ */
function openPlayer(ch, list, idx) {
  currentList = list;
  currentIdx  = idx;

  document.getElementById('mTitle').textContent = ch.name;
  document.getElementById('mSub').textContent   = ch.sub || 'Canal en vivo';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  loadFrame(ch.src);

  // Marcar activo
  document.querySelectorAll('.ch-card.playing').forEach(c => c.classList.remove('playing'));
}

function loadFrame(src) {
  const frame   = document.getElementById('pframe');
  const overlay = document.getElementById('loadingOv');
  overlay.style.display = 'flex';
  frame.src = '';

  clearTimeout(loadTimer);
  loadTimer = setTimeout(() => { overlay.style.display = 'none'; }, 3500);

  frame.onload = () => { overlay.style.display = 'none'; };
  frame.src = src;
}

function closePlayer() {
  clearTimeout(loadTimer);
  const frame = document.getElementById('pframe');
  frame.src = '';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function navCh(dir) {
  if (!currentList.length) return;
  currentIdx = (currentIdx + dir + currentList.length) % currentList.length;
  const ch = currentList[currentIdx];
  document.getElementById('mTitle').textContent = ch.name;
  document.getElementById('mSub').textContent   = ch.sub;
  loadFrame(ch.src);
}

function goFull() {
  const box = document.getElementById('pbox');
  (box.requestFullscreen || box.webkitRequestFullscreen || box.mozRequestFullScreen).call(box);
}

/* ═══ HIDE ═══ */
function hideChannel(ch, card) {
  hidden.add(ch.src);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hidden]));
  card.style.transition = 'opacity .25s,transform .25s';
  card.style.opacity = '0';
  card.style.transform = 'scale(.85)';
  setTimeout(() => { card.remove(); }, 250);
  toast('Canal ocultado');
}

/* ═══ CATEGORÍAS ═══ */
document.getElementById('cats').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.getElementById('q').value = '';
  searchQ = '';
  render();
});

/* ═══ BÚSQUEDA ═══ */
let sTimer;
document.getElementById('q').addEventListener('input', e => {
  clearTimeout(sTimer);
  sTimer = setTimeout(() => {
    searchQ = e.target.value.trim();
    render();
  }, 300);
});

/* ═══ PWA ═══ */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('ib_inst_ok')) {
    setTimeout(() => document.getElementById('instBanner').classList.add('show'), 5000);
  }
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') toast('✅ App instalada');
      deferredPrompt = null;
    });
  } else {
    toast('Usa "Añadir a pantalla de inicio" en tu navegador');
  }
  dismissInst();
}
function dismissInst() {
  document.getElementById('instBanner').classList.remove('show');
  localStorage.setItem('ib_inst_ok','1');
}

/* ═══ TOAST ═══ */
let tTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tTimer);
  tTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ═══ INIT ═══ */
render();
</script>
