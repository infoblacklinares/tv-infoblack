<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="InfoblackTV"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="logo.png"/>
<title>Infoblack TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
:root{
  --bg:#0a0a0a; --surface:#111; --card:#181818;
  --border:#2a2a2a; --gold:#f5a623; --red:#e50914;
  --text:#fff; --muted:#888; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:linear-gradient(to bottom,#000 0%,rgba(0,0,0,.85) 100%);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.logo img{height:34px;width:34px;border-radius:50%;object-fit:cover;}
.logo-text{font-weight:900;font-size:1.05rem;color:var(--gold);letter-spacing:.5px;}
.search-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:0 14px;max-width:360px;
}
.search-wrap svg{color:var(--muted);flex-shrink:0;}
.search-wrap input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:.875rem;padding:9px 0;
}
.search-wrap input::placeholder{color:var(--muted);}

/* CATEGORÍAS */
.cats{
  display:flex;gap:8px;overflow-x:auto;padding:10px 16px;
  border-bottom:1px solid var(--border);scrollbar-width:none;
}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  padding:7px 16px;border-radius:20px;border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.cat-btn:hover{color:var(--text);border-color:#555;}
.cat-btn.active{background:var(--gold);border-color:var(--gold);color:#000;}

/* CONTENT */
.page{padding:16px;display:flex;flex-direction:column;gap:20px;min-height:calc(100vh - 140px);}

.row-title{
  font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.row-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* CANALES GRID */
.ch-grid{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
}
.ch-card{
  position:relative;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:transform .15s,border-color .15s;
}
.ch-card:hover{transform:translateY(-3px);border-color:var(--gold);}
.ch-card.playing{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,166,35,.3);}
.ch-thumb{
  width:100%;aspect-ratio:16/9;background:#111;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;overflow:hidden;position:relative;
}
.ch-thumb img{width:100%;height:100%;object-fit:contain;padding:10px;}
.ch-thumb .fallback{position:absolute;font-size:2rem;}
.ch-live-badge{
  position:absolute;top:6px;left:6px;
  background:var(--red);color:#fff;font-size:.52rem;font-weight:800;
  padding:2px 5px;border-radius:3px;letter-spacing:.5px;z-index:2;
}
.ch-del{
  position:absolute;top:5px;right:5px;z-index:3;
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1px solid #444;
  display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:.7rem;color:var(--muted);
  transition:background .15s,color .15s;
}
.ch-del:hover{background:var(--red);color:#fff;border-color:var(--red);}
.ch-card:hover .ch-del{display:flex;}
.ch-info{padding:8px 9px 10px;}
.ch-name{font-size:.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-group{font-size:.63rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-card{border-radius:var(--radius);overflow:hidden;}
.sk-thumb{width:100%;aspect-ratio:16/9;}
.sk-text{height:10px;margin:8px 9px;border-radius:4px;}
.sk-text2{height:8px;margin:4px 9px 10px;width:60%;border-radius:4px;}

/* PLAYER MODAL */
.modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:#000;flex-direction:column;
}
.modal.open{display:flex;}
.modal-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(0,0,0,.9);flex-shrink:0;
}
.modal-info .modal-title{font-size:.95rem;font-weight:700;}
.modal-info .modal-sub{font-size:.72rem;color:var(--muted);margin-top:2px;}
.modal-close{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;}
.modal-close svg{width:24px;height:24px;fill:currentColor;}
.player-box{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;}
.player-box video{width:100%;height:100%;max-height:100%;}
.player-box iframe{width:100%;height:100%;border:none;}
.player-err{
  display:none;flex-direction:column;align-items:center;gap:12px;
  position:absolute;inset:0;background:#000;color:var(--muted);
  justify-content:center;text-align:center;padding:20px;
}
.player-err .err-icon{font-size:3rem;}
.player-err p{font-size:.875rem;}
.player-err button{
  background:var(--gold);color:#000;border:none;border-radius:8px;
  padding:10px 24px;font-size:.875rem;font-weight:700;cursor:pointer;margin-top:8px;
}
.modal-footer{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;background:rgba(0,0,0,.9);flex-shrink:0;flex-wrap:wrap;
}
.fbtn{
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:7px 16px;border-radius:20px;
  cursor:pointer;font-size:.78rem;font-weight:600;transition:background .15s;
}
.fbtn:hover{background:var(--border);}
.fbtn.gold{background:var(--gold);border-color:var(--gold);color:#000;}

/* INSTALL BANNER */
.install-banner{
  display:none;position:fixed;bottom:16px;left:12px;right:12px;z-index:60;
  background:linear-gradient(135deg,#1c1200,#111);
  border:1px solid var(--gold);border-radius:12px;padding:14px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
}
.install-banner.show{display:block;}
.ib-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.ib-title{font-size:.9rem;font-weight:700;color:var(--gold);}
.ib-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;}
.ib-sub{font-size:.75rem;color:var(--muted);margin-bottom:10px;}
.ib-btn{
  width:100%;background:var(--gold);color:#000;border:none;
  border-radius:8px;padding:10px;font-size:.875rem;font-weight:800;cursor:pointer;
}

/* LOADING / EMPTY */
.status-msg{text-align:center;padding:40px;color:var(--muted);font-size:.875rem;}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
  z-index:200;background:rgba(20,20,20,.97);border:1px solid var(--border);
  color:var(--text);padding:9px 20px;border-radius:20px;font-size:.8rem;font-weight:600;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a class="logo" href="#">
    <img src="logo.png" alt="IB" onerror="this.style.display='none'">
    <span class="logo-text">INFOBLACK TV</span>
  </a>
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="search" placeholder="Buscar canal…"/>
  </div>
</header>

<!-- CATEGORÍAS -->
<div class="cats" id="cats">
  <button class="cat-btn active" data-list="cl">🇨🇱 Chile</button>
  <button class="cat-btn" data-list="animation">🎌 Anime</button>
  <button class="cat-btn" data-list="sports">🏆 Deportes / WWE</button>
  <button class="cat-btn" data-list="movies">🎬 Películas</button>
  <button class="cat-btn" data-list="news">📰 Noticias</button>
  <button class="cat-btn" data-list="music">🎵 Música</button>
  <button class="cat-btn" data-list="kids">👶 Infantil</button>
  <button class="cat-btn" data-list="spa">🌎 Latino</button>
  <button class="cat-btn" data-list="ar">🇦🇷 Argentina</button>
  <button class="cat-btn" data-list="mx">🇲🇽 México</button>
  <button class="cat-btn" data-list="us">🇺🇸 USA</button>
</div>

<!-- CONTENIDO -->
<div class="page" id="page"></div>

<!-- PLAYER MODAL -->
<div class="modal" id="modal">
  <div class="modal-bar">
    <div class="modal-info">
      <div class="modal-title" id="modalTitle">—</div>
      <div class="modal-sub" id="modalSub">Canal en vivo</div>
    </div>
    <button class="modal-close" onclick="closePlayer()">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
  <div class="player-box" id="playerBox">
    <video id="videoEl" controls autoplay playsinline></video>
    <div class="player-err" id="playerErr">
      <div class="err-icon">📡</div>
      <p>Este canal no está disponible en este momento.<br>Intenta con otro servidor o canal.</p>
      <button onclick="tryNext()">▶ Siguiente canal</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="fbtn" onclick="prevCh()">◀ Anterior</button>
    <button class="fbtn gold" onclick="goFull()">⛶ Pantalla completa</button>
    <button class="fbtn" onclick="nextCh()">Siguiente ▶</button>
  </div>
</div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="ib-row">
    <span class="ib-title">📲 Instala Infoblack TV</span>
    <button class="ib-close" onclick="dismissInstall()">✕</button>
  </div>
  <div class="ib-sub">Acceso rápido desde tu pantalla de inicio</div>
  <button class="ib-btn" onclick="installApp()">INSTALAR GRATIS</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ══ CONFIG ══ */
const PROXY   = '/api/stream?url=';
const API     = '/api/channels?list=';
const HIDDEN  = 'ib_hidden_v2';
const CORS_PX = 'https://corsproxy.io/?'; // fallback

/* ══ ESTADO ══ */
let hidden      = new Set(JSON.parse(localStorage.getItem(HIDDEN)||'[]'));
let allChannels = [];
let currentList = [];
let currentIdx  = -1;
let hlsInst     = null;
let currentCat  = 'cl';
let searchTimer = null;
let deferredPrompt = null;

/* ══ FETCH CANALES ══ */
async function loadChannels(list, search = '') {
  currentCat = list;
  const page = document.getElementById('page');
  page.innerHTML = `<div class="status-msg"><div class="spinner"></div>Cargando canales de iptv-org…</div>`;

  try {
    let url = `${API}${list}&limit=300`;
    if (search) url += `&q=${encodeURIComponent(search)}`;

    const r = await fetch(url);
    if (!r.ok) throw new Error('Error al cargar la lista');
    const data = await r.json();

    allChannels = (data.channels || []).filter(c => !hidden.has(c.url));
    renderChannels(allChannels, data.total);
  } catch (e) {
    page.innerHTML = `<div class="status-msg">❌ Error: ${e.message}<br><small>Asegúrate de que el backend está desplegado en Vercel</small></div>`;
  }
}

/* ══ RENDER ══ */
function renderChannels(channels, total) {
  const page = document.getElementById('page');
  page.innerHTML = '';

  if (!channels.length) {
    page.innerHTML = `<div class="status-msg">Sin canales disponibles</div>`;
    return;
  }

  // Agrupar por group-title
  const groups = {};
  for (const ch of channels) {
    const g = ch.group || 'General';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  }

  // Info total
  const info = document.createElement('p');
  info.style.cssText = 'font-size:.75rem;color:var(--muted);margin-bottom:4px;';
  info.textContent = `${channels.length} canales disponibles (${total} en la lista)`;
  page.appendChild(info);

  for (const [group, chs] of Object.entries(groups)) {
    const section = document.createElement('div');

    const title = document.createElement('div');
    title.className = 'row-title';
    title.textContent = group;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'ch-grid';

    chs.forEach((ch, i) => {
      const globalIdx = channels.indexOf(ch);
      grid.appendChild(buildCard(ch, channels, globalIdx));
    });

    section.appendChild(grid);
    page.appendChild(section);
  }
}

function buildCard(ch, list, idx) {
  const card = document.createElement('div');
  card.className = 'ch-card';

  const thumb = document.createElement('div');
  thumb.className = 'ch-thumb';
  if (ch.logo) {
    const img = document.createElement('img');
    img.src = ch.logo;
    img.loading = 'lazy';
    img.onerror = () => { img.style.display='none'; thumb.querySelector('.fallback').style.display='flex'; };
    thumb.appendChild(img);
  }
  const fallback = document.createElement('span');
  fallback.className = 'fallback';
  fallback.textContent = '📺';
  fallback.style.display = ch.logo ? 'none' : 'flex';
  thumb.appendChild(fallback);

  const badge = document.createElement('span');
  badge.className = 'ch-live-badge';
  badge.textContent = 'EN VIVO';
  thumb.appendChild(badge);

  const del = document.createElement('button');
  del.className = 'ch-del';
  del.textContent = '✕';
  del.title = 'Ocultar canal';
  del.onclick = e => { e.stopPropagation(); hideChannel(ch, card); };
  thumb.appendChild(del);

  const info = document.createElement('div');
  info.className = 'ch-info';
  info.innerHTML = `<div class="ch-name">${ch.name}</div><div class="ch-group">${ch.group||''}</div>`;

  card.appendChild(thumb);
  card.appendChild(info);
  card.onclick = () => playChannel(ch, list, idx);
  return card;
}

/* ══ PLAYER ══ */
function playChannel(ch, list, idx) {
  currentList = list;
  currentIdx  = idx;

  document.getElementById('modalTitle').textContent = ch.name;
  document.getElementById('modalSub').textContent   = ch.group || 'Canal en vivo';
  document.getElementById('playerErr').style.display = 'none';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Marcar activo
  document.querySelectorAll('.ch-card.playing').forEach(c => c.classList.remove('playing'));

  startStream(ch.url, ch.name);
}

function startStream(url, name) {
  const video = document.getElementById('videoEl');

  // Destruir HLS previo
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }

  const proxyUrl = PROXY + encodeURIComponent(url);

  if (Hls.isSupported()) {
    hlsInst = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      maxBufferLength: 30,
    });
    hlsInst.loadSource(proxyUrl);
    hlsInst.attachMedia(video);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    hlsInst.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) showErr();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = proxyUrl;
    video.play().catch(showErr);
  } else {
    showErr();
  }
}

function showErr() {
  document.getElementById('playerErr').style.display = 'flex';
}

function closePlayer() {
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
  const v = document.getElementById('videoEl');
  v.pause(); v.src = '';
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function prevCh() {
  if (!currentList.length) return;
  currentIdx = currentIdx <= 0 ? currentList.length-1 : currentIdx-1;
  const ch = currentList[currentIdx];
  document.getElementById('modalTitle').textContent = ch.name;
  document.getElementById('playerErr').style.display = 'none';
  startStream(ch.url, ch.name);
}

function nextCh() {
  if (!currentList.length) return;
  currentIdx = currentIdx >= currentList.length-1 ? 0 : currentIdx+1;
  const ch = currentList[currentIdx];
  document.getElementById('modalTitle').textContent = ch.name;
  document.getElementById('playerErr').style.display = 'none';
  startStream(ch.url, ch.name);
}

function tryNext() { nextCh(); }

function goFull() {
  const box = document.getElementById('playerBox');
  (box.requestFullscreen || box.webkitRequestFullscreen).call(box);
}

/* ══ OCULTAR CANAL ══ */
function hideChannel(ch, card) {
  hidden.add(ch.url);
  localStorage.setItem(HIDDEN, JSON.stringify([...hidden]));
  card.style.transition = 'opacity .3s, transform .3s';
  card.style.opacity = '0';
  card.style.transform = 'scale(.8)';
  setTimeout(() => card.remove(), 300);
  showToast('Canal ocultado');
}

/* ══ CATEGORÍAS ══ */
document.getElementById('cats').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b===btn));
  clearTimeout(searchTimer);
  document.getElementById('searchInput').value = '';
  loadChannels(btn.dataset.list);
});

/* ══ SEARCH ══ */
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = e.target.value.trim();
    if (q.length < 2) return loadChannels(currentCat);
    loadChannels(currentCat, q);
  }, 500);
});

/* ══ PWA ══ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('ib_install_dismissed')) {
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 4000);
  }
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      if (r.outcome==='accepted') showToast('✅ App instalada');
      deferredPrompt = null;
    });
  } else {
    showToast('Usa "Añadir a pantalla de inicio" en tu navegador');
  }
  dismissInstall();
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('ib_install_dismissed', '1');
}

/* ══ TOAST ══ */
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══ INIT ══ */
loadChannels('cl');
</script>
</body>
</html>
